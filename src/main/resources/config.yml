# Chat Enabled
# Only users with permission chat.bypass.disable can chat if this is false
chat-enabled: true

# Clear Chat Lines
clear-chat-lines: 100

# Discord alert webhook URL
webhook-enabled:
webhook-url:

spam-detection:
  enabled: true
  store-last: 25
  min-time-between-messages: 1
  message-density:
    enabled: true
    max-amount: 15
    over-time: 5


database:
  enabled: true
  litebans:
    url: ""
    user: ""
    password: ""

  premium-vanish:
    url: ""
    user: ""
    password: ""

# In order of priority.
# The first one will have the most priority.
format:
  # This will have the permissions chat.default
  default:
    prefix: ""
    postfix: ""